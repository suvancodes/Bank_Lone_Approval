<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Loan Approval Prediction</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
background: linear-gradient(180deg,#071033 0%, #07142a 100%);
color:white;
font-family:system-ui,-apple-system,Roboto;
padding-top:80px;
}

.card{
background:rgba(255,255,255,0.10);
border:1px solid rgba(255,255,255,0.2);
backdrop-filter:blur(10px);
border-radius:14px;
}

.form-control,.form-select{
background:#f1f5f9;
color:#041428;
height:46px;
font-weight:500;
}

.btn-primary{
background:linear-gradient(90deg,#06b6d4,#4f46e5);
border:0;
font-weight:600;
}

.loader{
border:6px solid rgba(255,255,255,0.2);
border-top:6px solid #4f46e5;
border-radius:50%;
width:45px;
height:45px;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

.approved,.rejected{
padding:18px;
border-radius:12px;
font-size:1.1rem;
animation:fadeIn .5s ease-in-out;
}

.approved{
background:#16a34a;
border-left:6px solid #22c55e;
}

.rejected{
background:#dc2626;
border-left:6px solid #f97316;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<nav class="navbar fixed-top" style="background:rgba(2,6,23,.85);">
<div class="container d-flex justify-content-between">
<a class="navbar-brand">
<i class="bi bi-bank2 me-2"></i>Loan Approval Predictor
</a>

<a href="emi.html" class="btn btn-outline-light btn-sm">
EMI Calculator
</a>
</div>
</nav>

<main class="container my-5">
<div class="row justify-content-center">
<div class="col-lg-8">

<div class="card p-4">

<h3 class="mb-3">Loan Approval Prediction</h3>

<form id="predictForm" class="row g-3">

<div class="col-12">
<label class="form-label">Bank Name</label>
<select id="Bank_Name" class="form-select" required>
<option value="" disabled selected>Select bank</option>
<option value="SBI bank">SBI Bank</option>
<option value="AXIX bank">AXIS Bank</option>
<option value="HDFC bank">HDFC Bank</option>
<option value="Others">Others</option>
</select>
</div>

<div class="col-md-3">
<label class="form-label">Gender</label>
<select id="Gender" class="form-select">
<option value="1">Male</option>
<option value="0">Female</option>
</select>
</div>

<div class="col-md-3">
<label class="form-label">Married</label>
<select id="Married" class="form-select">
<option value="1">Yes</option>
<option value="0">No</option>
</select>
</div>

<div class="col-md-3">
<label class="form-label">Education</label>
<select id="Education" class="form-select">
<option value="1">Graduate</option>
<option value="0">Not Graduate</option>
</select>
</div>

<div class="col-md-3">
<label class="form-label">Self Employed</label>
<select id="Self_Employed" class="form-select">
<option value="0">No</option>
<option value="1">Yes</option>
</select>
</div>

<div class="col-md-4">
<label class="form-label">Applicant Income (₹ / Month)</label>
<input type="number" id="ApplicantIncome" class="form-control" required>
</div>

<div class="col-md-4">
<label class="form-label">Co-Applicant Income (₹ / Month)</label>
<input type="number" id="CoapplicantIncome" class="form-control" required>
</div>

<div class="col-md-4">
<label class="form-label">Loan Amount (₹ Thousands)</label>
<input type="number" id="LoanAmount" class="form-control" required>
</div>

<div class="col-md-6">
<label class="form-label">Loan Term (Months)</label>
<input type="number" id="Loan_Amount_Term" class="form-control" required>
</div>

<div class="col-md-6">
<label class="form-label">Credit History</label>
<select id="Credit_History" class="form-select">
<option value="1">Good</option>
<option value="0">Bad</option>
</select>
</div>

<div class="col-12 text-end">
<button class="btn btn-primary" type="submit">
Predict
</button>
</div>

</form>

<div id="loadingBox" class="text-center mt-4" style="display:none;">
<div class="loader"></div>
<p class="mt-2">Predicting... please wait</p>
</div>

<div id="result" class="mt-4" style="display:none;">
<div id="resultBox"></div>
</div>

</div>
</div>
</div>
</main>

<script>

const BACKEND_URL = "https://bank-lone-approval-1.onrender.com/predict";

document.getElementById("predictForm").addEventListener("submit", async function(e){

e.preventDefault();

const fields = [
"Bank_Name",
"Gender",
"Married",
"Education",
"Self_Employed",
"ApplicantIncome",
"CoapplicantIncome",
"LoanAmount",
"Loan_Amount_Term",
"Credit_History"
];

for(let id of fields){
if(!document.getElementById(id).value){
alert("Please fill all fields");
return;
}
}

document.getElementById("loadingBox").style.display="block";
document.getElementById("result").style.display="none";

let payload = {};

fields.forEach(id=>{
let value=document.getElementById(id).value;
payload[id]=isNaN(value)?value:Number(value);
});

try{

const controller = new AbortController();
setTimeout(()=>controller.abort(),20000);

const res = await fetch(BACKEND_URL,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(payload),
signal:controller.signal
});

const data = await res.json();

const label = data.result.label;

const box=document.getElementById("resultBox");

if(label==="Approved"){

box.innerHTML=`
<div class="approved">
<strong>Loan Approved ✔</strong><br>
Your loan has high chances of approval.
</div>
`;

}else{

box.innerHTML=`
<div class="rejected">
<strong>Loan Rejected ✘</strong><br>
The model predicts this loan may not be approved.
</div>
`;

}

}catch(err){

document.getElementById("resultBox").innerHTML=`
<div class="rejected">
<strong>Server Error</strong><br>
The server may be sleeping. Try again in a few seconds.
</div>
`;

}

document.getElementById("loadingBox").style.display="none";
document.getElementById("result").style.display="block";

});

</script>

</body>
</html>
